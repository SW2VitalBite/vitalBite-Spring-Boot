# ===================================================================
# NOMBRE DEL MICROSERVICIO
# ===================================================================
spring.application.name=vitalbite-documental

# ===================================================================
# CONFIGURACIÓN DEL SERVIDOR
# ===================================================================
server.port=8082
server.servlet.context-path=/api/v1

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (PostgreSQL / Supabase)
# ===================================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (importante para producción)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${LOG_LEVEL:false}
spring.jpa.properties.hibernate.format_sql=${LOG_LEVEL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Evita el error LazyInitializationException en desarrollo
spring.jpa.open-in-view=false

# ===================================================================
# CONFIGURACIÓN AWS S3
# ===================================================================
aws.s3.bucket-name=${AWS_BUCKET_NAME}
aws.s3.region=${AWS_REGION}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
# Tiempo de expiración de URLs prefirmadas (en minutos)
aws.s3.presigned-url-expiration=15

# ===================================================================
# CONFIGURACIÓN JWT (para validar tokens del Core NestJS)
# ===================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===================================================================
# CONFIGURACIÓN DE SPRING ACTUATOR
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ===================================================================
# CONFIGURACIÓN DE LOGS
# ===================================================================
logging.level.com.vitalbite=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n