version: '3.9'

services:
  vitalbite-documental:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vitalbite-documental
    ports:
      - "8082:8082"
    environment:
      # BASE DE DATOS
      DB_URL: jdbc:postgresql://postgres:5432/vitalbite_documental
      DB_USERNAME: postgres
      DB_PASSWORD: postgres_password
      
      # AWS S3
      AWS_BUCKET_NAME: vitalbite-uploads
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # JVM
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vitalbite-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: vitalbite-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: vitalbite_documental
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vitalbite-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  vitalbite-network:
    driver: bridge
